version: "3.9"

# ---------------------------------------------------------------
# Production compose file — run on EC2 with:
#   docker compose -f docker-compose.prod.yml up -d
# Make sure .env.production exists with real secrets before running.
# ---------------------------------------------------------------

services:
  app:
    build: .
    container_name: job_tracker_app
    restart: always
    ports:
      - "3001:3001"
    env_file:
      - .env.production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Run DB migrations automatically on startup
    command: sh -c "npx prisma migrate deploy && node server.js"

  postgres:
    image: postgres:16-alpine
    container_name: job_tracker_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: job_tracker_redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data: